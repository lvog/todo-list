<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do list</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <div id="wrapper">
      <div class="todo-block">
        <h1>Todo list</h1>
        <form class="todo-form" action="#">
          <div class="popup">
            <div class="popup-block">
              <div class="info-holder">
                <h2>New note</h2>
                <input
                  class="note-info"
                  type="text"
                  placeholder="Add your note ..."
                  name="note"
                />
              </div>
              <div class="btn-holder">
                <button class="btn btn-outline" type="reset">Cancel</button>
                <button class="btn" type="submit">Apply</button>
              </div>
            </div>
          </div>
        </form>
        <div class="notes-holder"></div>
        <button class="btn-opener popup-opener"></button>
      </div>
    </div>
  </body>
</html>
